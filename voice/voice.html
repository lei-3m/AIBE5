<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이의 영어 듣기 스피커</title>
    <style>
      body {
        font-family: "Arial", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #f0f2f5;
        color: #333;
      }
      .container {
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 80%;
        max-width: 600px;
        text-align: center;
      }
      textarea {
        width: calc(100% - 20px);
        height: 150px;
        margin-bottom: 20px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
        resize: vertical;
      }
      button {
        background-color: #6c757d;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        transition: background-color 0.3s ease;
      }
      button:hover {
        background-color: #5a6268;
      }
      select {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ddd;
        margin-bottom: 10px;
      }
      p {
        margin-top: 20px;
        font-style: italic;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>제이드의 위로 듣기 (영어)</h1>
      <textarea
        id="textToSpeak"
        placeholder="여기에 제이드 대본을 붙여넣으세요..."
      ></textarea>
      <select id="voiceSelect"></select>
      <button id="speakButton">제이드가 말해요! 🗣️</button>
      <p>
        ※ 이 음성은 웹 브라우저의 기본 TTS 기능을 사용합니다. 브라우저/OS에 따라
        음색이 달라질 수 있습니다.
      </p>
    </div>

    <script>
      const textToSpeak = document.getElementById("textToSpeak");
      const speakButton = document.getElementById("speakButton");
      const voiceSelect = document.getElementById("voiceSelect");
      let synth = window.speechSynthesis;
      let voices = [];

      function populateVoiceList() {
        voices = synth.getVoices().sort((a, b) => a.name.localeCompare(b.name));
        voiceSelect.innerHTML = "";
        for (let i = 0; i < voices.length; i++) {
          const option = document.createElement("option");
          option.textContent = voices[i].name + " (" + voices[i].lang + ")";

          if (voices[i].lang.startsWith("en-")) {
            // 영어 목소리만 필터링하거나 우선 순위 지정
            option.value = voices[i].name;
            if (voices[i].default) {
              // 기본 영어 목소리 선택
              option.selected = true;
            }
            voiceSelect.appendChild(option);
          }
        }
      }

      populateVoiceList();
      if (synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = populateVoiceList;
      }

      speakButton.addEventListener("click", () => {
        if (textToSpeak.value !== "") {
          if (synth.speaking) {
            // 이미 말하고 있으면 중지
            synth.cancel();
          }
          const utterThis = new SpeechSynthesisUtterance(textToSpeak.value);
          utterThis.voice = voices.find(
            (voice) => voice.name === voiceSelect.value,
          );
          utterThis.rate = 0.9; // 조금 느리게 (0.1 ~ 10)
          utterThis.pitch = 1; // 음높이 (0 ~ 2)
          utterThis.lang = "en-US"; // 강제로 영어로 설정 (필요시)

          utterThis.onerror = function (event) {
            console.error("SpeechSynthesisUtterance.onerror", event);
            alert(
              "음성 변환 중 오류가 발생했습니다. 브라우저 설정을 확인해주세요.",
            );
          };

          synth.speak(utterThis);
        } else {
          alert("말할 내용을 입력해주세요!");
        }
      });
    </script>
  </body>
</html>
